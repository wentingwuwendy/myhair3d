<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHair 3D – Real-time Hair Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(139,92,246,0.2);
      flex-shrink: 0;
    }
    header h1 { font-size: 20px; background: linear-gradient(90deg,#8B5CF6,#EC4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .badge { font-size: 11px; background: rgba(139,92,246,0.2); border: 1px solid #8B5CF6; color: #c4b5fd; padding: 2px 8px; border-radius: 20px; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 3D Viewport ── */
    #viewport {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, #0d0d1a 70%);
    }
    #three-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .viewport-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,26,0.9);
      gap: 16px;
      z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { color: #c4b5fd; font-size: 14px; }

    /* ── Right panel ── */
    .panel {
      width: 300px;
      background: rgba(255,255,255,0.03);
      border-left: 1px solid rgba(139,92,246,0.15);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .section {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8B5CF6;
      margin-bottom: 14px;
      font-weight: 600;
    }

    /* Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .slider-row label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      width: 52px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(139,92,246,0.25);
      border-radius: 2px;
      outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #8B5CF6;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(139,92,246,0.6);
    }
    .slider-val {
      font-size: 12px;
      color: #c4b5fd;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Color presets */
    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-chip {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .color-chip:hover { transform: scale(1.15); }
    .color-chip.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }

    /* Style presets */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .preset-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(139,92,246,0.2);
      color: #c4b5fd;
      padding: 8px 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: all 0.15s;
    }
    .preset-btn:hover { background: rgba(139,92,246,0.15); border-color: #8B5CF6; }
    .preset-btn.active { background: rgba(139,92,246,0.25); border-color: #8B5CF6; color: #fff; }
    .preset-icon { font-size: 18px; display: block; margin-bottom: 4px; }

    /* Download btn */
    .dl-btn {
      margin: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: calc(100% - 32px);
      transition: opacity 0.15s;
    }
    .dl-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>✂ MyHair 3D</h1>
  <span class="badge">3D Studio</span>
</header>

<div class="main">
  <!-- 3D Viewport -->
  <div id="viewport">
    <canvas id="three-canvas"></canvas>
    <div class="viewport-hint">🖱 拖拽旋转 · 滚轮缩放</div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>构建 3D 发型模型...</p>
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="panel">

    <div class="section">
      <div class="section-title">📐 发型参数</div>
      <div class="slider-row">
        <label>长度</label>
        <input type="range" id="sl-length" min="0" max="100" value="60">
        <span class="slider-val" id="v-length">60</span>
      </div>
      <div class="slider-row">
        <label>卷度</label>
        <input type="range" id="sl-curl" min="0" max="100" value="30">
        <span class="slider-val" id="v-curl">30</span>
      </div>
      <div class="slider-row">
        <label>发量</label>
        <input type="range" id="sl-volume" min="0" max="100" value="60">
        <span class="slider-val" id="v-volume">60</span>
      </div>
      <div class="slider-row">
        <label>刘海</label>
        <input type="range" id="sl-bangs" min="0" max="100" value="20">
        <span class="slider-val" id="v-bangs">20</span>
      </div>
      <div class="slider-row">
        <label>光泽</label>
        <input type="range" id="sl-shine" min="0" max="100" value="50">
        <span class="slider-val" id="v-shine">50</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🎨 发色</div>
      <div class="color-row" id="color-row"></div>
    </div>

    <div class="section">
      <div class="section-title">💇 发型预设</div>
      <div class="preset-grid" id="preset-grid"></div>
    </div>

    <button class="dl-btn" id="btn-download">⬇ 下载截图</button>

  </div>
</div>

<!-- Three.js r158 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="js/hair3d.js"></script>
</body>
</html>
